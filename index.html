
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRHOMZ AI DESIGNER | DECOR • DESIGN • DELIVERED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-gold: #c5a059;
        --brand-sage: #567772;
        --brand-dark: #0a0f0e;
      }
      
      body {
        background: radial-gradient(circle at 50% -20%, #1a2a28 0%, #0a0f0e 100%);
        overflow-x: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0f0e;
      }
      ::-webkit-scrollbar-thumb {
        background: #2f403e;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--brand-gold);
      }

      .glass-card {
        background: rgba(15, 23, 21, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(197, 160, 89, 0.1);
      }

      .gold-glow {
        box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
      }

      .text-gold {
        color: var(--brand-gold);
      }

      @keyframes slide-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-slide-up {
        animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .gold-shimmer {
        background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.1), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .font-nav {
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-weight: 700;
        font-size: 0.65rem;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gold: {
                50: '#fcfaf2',
                100: '#f7f1db',
                200: '#eddca9',
                300: '#e1c172',
                400: '#d5a146',
                500: '#c5a059', // Brand Gold
                600: '#ae8044',
                700: '#91643a',
                800: '#775234',
                900: '#62442e',
                950: '#382517',
              },
              brand: {
                50: '#f4f7f6',
                100: '#e3e9e8',
                200: '#c5d3d0',
                300: '#9db4b0',
                400: '#75938e',
                500: '#567772',
                600: '#425f5b',
                700: '#374d4a',
                800: '#2f403e',
                900: '#293634',
                950: '#0a0f0e',
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
</head>
  <body class="bg-brand-950 text-white antialiased">
    <div id="root"></div>
  </body>
</html>
